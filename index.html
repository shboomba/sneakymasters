<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicheLeaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <h1>MicheLeaderboard</h1>
        <p class="header-subtitle">Race to Masters</p>
      </div>
      <div class="header-controls">
        <button id="btn-refresh-all" class="btn btn-secondary">Refresh All</button>
        <button id="btn-add-player" class="btn btn-primary">+ Add Player</button>
      </div>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="cards">Player Leaderboard</button>
    <button class="tab-btn" data-tab="rankings">Rankings</button>
    <button class="tab-btn" data-tab="numberline">Race Line</button>
  </div>

  <main>
    <div id="tab-cards" class="tab-panel active">
      <div class="leaderboard-toolbar">
        <button id="btn-toggle-lp-history" class="btn btn-secondary">Toggle LP History</button>
        <div class="filter-dropdown-wrap">
          <label class="filter-label" for="filter-select">Filter by...</label>
          <select id="filter-select" class="filter-select">
            <option value="leaderboard">Leaderboard</option>
            <option value="role">Role</option>
            <option value="arrange">Custom</option>
          </select>
        </div>
      </div>
      <div id="leaderboard"></div>
    </div>

    <div id="tab-rankings" class="tab-panel">
      <div id="rankings-list"></div>
    </div>
  </main>

  <div id="tab-numberline" class="tab-panel">
    <div id="numberline-container">
      <button class="nl-arrow nl-arrow-left" id="nl-left">&#8592;</button>
      <div id="numberline-scroll">
        <div id="numberline-track"></div>
      </div>
      <button class="nl-arrow nl-arrow-right" id="nl-right">&#8594;</button>
    </div>
  </div>

  <!-- Add Player Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-title">Add Player</h2>
      <p class="modal-hint">Enter the player's Riot ID (e.g. <code>PlayerName#NA1</code>)</p>
      <input
        id="input-riot-id"
        class="modal-input"
        type="text"
        placeholder="GameName#TAG"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="modal-error" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="btn-modal-confirm" class="btn btn-primary">Add Player</button>
      </div>
    </div>
  </div>

  <!-- Suggestion Widget -->
  <div id="suggestion-widget">
    <div id="suggestion-panel" class="hidden">
      <div class="suggestion-header">
        <span>Add a Suggestion</span>
        <button id="suggestion-close">&#10005;</button>
      </div>
      <textarea id="suggestion-text" placeholder="Give me your fresh thoughts..." rows="4"></textarea>
      <div id="suggestion-status" class="hidden"></div>
      <button id="suggestion-submit" class="btn btn-primary">Send</button>
    </div>
    <button id="suggestion-fab">&#43; Suggestion</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
